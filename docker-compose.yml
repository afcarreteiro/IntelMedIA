version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - INTELMEDIA_DATABASE_URL=sqlite:///./intelmedia.db
      - INTELMEDIA_JWT_SECRET=${INTELMEDIA_JWT_SECRET:-dev-secret-key-change-in-production}
      - INTELMEDIA_REGION=pt-PT
      - INTELMEDIA_TRANSLATION_PROVIDER=demo
    volumes:
      - backend_data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    environment:
      - VITE_API_BASE_URL=http://localhost:8000
    depends_on:
      - backend

volumes:
  backend_data:
